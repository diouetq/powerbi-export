<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rapport Power BI</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #f0f4f8;
      color: #1a2332;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 16px;
    }

    /* ── Rapport Power BI — élément principal ── */
    .pbi-wrapper {
      width: 100%;
      max-width: 1200px;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 2px 16px rgba(0,0,0,0.08);
      background: #fff;
    }
    iframe {
      width: 100%;
      height: 80vh;
      min-height: 500px;
      border: none;
      display: block;
    }

    /* ── Barre d'export compacte en dessous ── */
    .export-bar {
      width: 100%;
      max-width: 1200px;
      margin-top: 12px;
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .export-label {
      font-size: 13px;
      font-weight: 600;
      color: #4a5568;
      white-space: nowrap;
    }

    select {
      padding: 7px 12px;
      border: 1.5px solid #d1d9e6;
      border-radius: 7px;
      font-size: 13px;
      color: #1a2332;
      background: #fafbfc;
      outline: none;
      cursor: pointer;
    }
    select:focus { border-color: #0078d4; }

    .format-group {
      display: flex;
      gap: 6px;
    }

    .format-btn {
      padding: 7px 14px;
      border: 1.5px solid #d1d9e6;
      border-radius: 7px;
      background: #fafbfc;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      color: #4a5568;
      transition: border-color .15s, background .15s, color .15s;
    }
    .format-btn:hover { border-color: #0078d4; color: #0078d4; }
    .format-btn.active {
      border-color: #0078d4;
      background: #e8f1fb;
      color: #0078d4;
    }

    .download-btn {
      padding: 8px 20px;
      background: #0078d4;
      color: #fff;
      border: none;
      border-radius: 7px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: background .2s;
      white-space: nowrap;
    }
    .download-btn:hover:not(:disabled) { background: #005fa3; }
    .download-btn:disabled { background: #a0aec0; cursor: not-allowed; }

    .status {
      font-size: 12px;
      display: none;
      align-items: center;
      gap: 7px;
      margin-left: auto;
    }
    .status.info    { color: #2471a3; display: flex; }
    .status.success { color: #1e8449; display: flex; }
    .status.error   { color: #c0392b; display: flex; }

    .spinner {
      width: 13px; height: 13px;
      border: 2px solid currentColor;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <!-- ══ Rapport Power BI — zone principale ══ -->
  <div class="pbi-wrapper">
    <iframe
      title="Rapport Power BI"
      src="https://app.powerbi.com/view?r=eyJrIjoiMzU3NmUwN2MtMThmNy00OTNhLWFmZjYtNWE0OTYwN2U1YjAzIiwidCI6ImIwMDI3NmM5LTJiNmYtNDVmYS1iYzYxLTA3YTAyY2JmNjQ2ZSJ9"
      allowfullscreen>
    </iframe>
  </div>

  <!-- ══ Barre d'export compacte ══ -->
  <div class="export-bar">

    <span class="export-label">📥 Exporter :</span>

    <select id="organisme">
      <option value="">— Tous les organismes —</option>
      <option value="Aiguillon Construction">Aiguillon Construction</option>
      <option value="FINISTERE HABITAT">FINISTERE HABITAT</option>
    </select>

    <div class="format-group">
      <button class="format-btn active" data-fmt="PDF" onclick="selectFormat(this)">PDF</button>
      <button class="format-btn" data-fmt="PPTX" onclick="selectFormat(this)">PPT</button>
    </div>

    <button class="download-btn" id="dlBtn" onclick="startExport()">
      ⬇ Télécharger
    </button>

    <div class="status" id="status">
      <div class="spinner" id="spinner" style="display:none"></div>
      <span id="statusText"></span>
    </div>

  </div>

  <script>
    const SERVER_URL = "https://powerbi-export.onrender.com";
    let selectedFormat = "PDF";

    function selectFormat(btn) {
      document.querySelectorAll(".format-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      selectedFormat = btn.dataset.fmt;
    }

    function setStatus(type, msg, showSpinner = false) {
      const el  = document.getElementById("status");
      const txt = document.getElementById("statusText");
      const sp  = document.getElementById("spinner");
      el.className = `status ${type}`;
      txt.textContent = msg;
      sp.style.display = showSpinner ? "block" : "none";
    }

    async function startExport() {
      const btn       = document.getElementById("dlBtn");
      const organisme = document.getElementById("organisme").value.trim();
      const params    = new URLSearchParams({ format: selectedFormat });
      if (organisme) params.set("organisme", organisme);

      const url = `${SERVER_URL}/export?${params}`;

      btn.disabled = true;
      setStatus("info", "Génération en cours…", true);

      try {
        const resp = await fetch(url);
        if (!resp.ok) {
          const err = await resp.json().catch(() => ({ error: "Erreur serveur" }));
          throw new Error(err.error || `HTTP ${resp.status}`);
        }
        const organisme = document.getElementById("organisme").value.trim();
        const date = new Date().toISOString().split("T")[0];
        const base = organisme ? organisme.replace(/[<>:"/\\|?*']/g, "_") : "Rapport";
        const filename = `${base}_${date}.${selectedFormat.toLowerCase()}`;
        const blob = await resp.blob();
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(a.href);
        setStatus("success", `✓ ${filename}`);
      } catch (err) {
        setStatus("error", `❌ ${err.message}`);
      } finally {
        btn.disabled = false;
      }
    }
  </script>

</body>
</html>
